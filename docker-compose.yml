services:
  postgres:
    image: postgres:16
    container_name: sport-tracker-db
    environment:
      POSTGRES_DB: sport_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: