<div>
  <h1>Se connecter</h1>
  <form
    [formGroup]="signInForm"
    (ngSubmit)="onSubmitLoginForm()"
    class="flex flex-col gap-y-3 w-full"
  >
    <div class="flex flex-col">
      <label for="email">Email :</label>
      <input pInputText id="email" type="text" formControlName="email" />
    </div>

    <div class="flex flex-col">
      <label for="password">Password :</label>
      <input pInputText id="password" type="password" formControlName="password" />
    </div>

    <div class="flex flex-row justify-between w-full items-center">
      <label class="flex items-center gap-x-1">
        <p-checkbox [binary]="true" /> Se rappeler de moi
      </label>
      <p-button label="Mot de pass oublié ?" link />
    </div>
    <p-button class="w-full pt-3" type="submit">Se connecter</p-button>
  </form>
  <span class="flex justify-start items-center"
    >Vous n'avez pas de compte ? <p-button label="Créer un compte" link routerLink="/auth/signup"
  /></span>
</div>
