<div class="flex flex-row h-screen w-screen items-center justify-center">
  <div class="w-1/2 h-full p-14 bg-neutral-900">
    <span class="logo-name">SportTracker</span>

    <h1>Welcome back</h1>
    <form
      [formGroup]="signInForm"
      (ngSubmit)="onSubmitLoginForm()"
      class="flex flex-col gap-y-3 w-full"
    >
      <label for="email">Email :</label>
      <input id="email" type="text" formControlName="email" />
      <label for="password">Password :</label>
      <input id="password" type="password" formControlName="password" />
      <p-button type="submit">Se connecter</p-button>
    </form>
  </div>
  <div class="w-1/2 h-full p-14"></div>
</div>
